name: CI

on:
  push:
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint all PHP files
        run: find . -name '*.php' -not -path './node_modules/*' -print0 | xargs -0 -n1 php -l

  # the committed build outputs must always match a fresh build of the
  # sources — the panel bundle (index.js/index.css) and the minified
  # frontend assets (assets/image-compare.{js,css}) alike. A stale build
  # must never reach main or a release, since installs use the committed
  # files as-is
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Fail if the committed build is stale
        run: |
          if ! git diff --exit-code -- index.js index.css assets/image-compare.js assets/image-compare.css; then
            echo "::error::committed build is stale — run 'npm run build' and commit the result"
            exit 1
          fi
